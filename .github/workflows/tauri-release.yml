name: Tauri Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tauri-release-main
  cancel-in-progress: false

jobs:
  release-gate:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
    steps:
      - name: Evaluate release marker
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s' "${COMMIT_MESSAGE}" | grep -qi '\[release\]'; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  prepare:
    needs: release-gate
    if: needs.release-gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      latest_tag: ${{ steps.version.outputs.latest_tag }}
      next_version: ${{ steps.version.outputs.next_version }}
      next_tag: ${{ steps.version.outputs.next_tag }}
      channel: ${{ steps.version.outputs.channel }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      release_body: ${{ steps.release_notes.outputs.body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail

          file_version="$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json','utf8')).version")"
          version_payload="$(node - "${file_version}" <<'NODE'
          const { execFileSync } = require("node:child_process");
          const [fileVersion] = process.argv.slice(2);
          const pattern = /^(\d+)\.(\d+)\.(\d+)(?:-alpha\.(\d+))?$/;
          const parse = (version) => {
            const match = pattern.exec(version);
            if (!match) {
              throw new Error(
                `Invalid version: ${version}. Use x.y.z or x.y.z-alpha.N`,
              );
            }
            return {
              raw: version,
              major: Number(match[1]),
              minor: Number(match[2]),
              patch: Number(match[3]),
              alpha: match[4] === undefined ? null : Number(match[4]),
            };
          };
          const compare = (left, right) =>
            left.major - right.major ||
            left.minor - right.minor ||
            left.patch - right.patch ||
            (left.alpha === null && right.alpha === null
              ? 0
              : left.alpha === null
                ? 1
                : right.alpha === null
                  ? -1
                  : left.alpha - right.alpha);

          const current = parse(fileVersion);
          const tags = execFileSync("git", ["tag", "-l", "v*"], {
            encoding: "utf8",
          })
            .split(/\r?\n/)
            .map((tag) => tag.trim())
            .filter(Boolean)
            .map((tag) => ({ tag, version: tag.replace(/^v/, "") }))
            .flatMap(({ tag, version }) => {
              try {
                return [{ tag, parsed: parse(version) }];
              } catch {
                return [];
              }
            })
            .sort((a, b) => compare(b.parsed, a.parsed));

          const latest = tags[0] ?? null;
          if (latest && compare(current, latest.parsed) <= 0) {
            throw new Error(
              `src-tauri/tauri.conf.json version (${fileVersion}) must be greater than latest tag (${latest.tag}).`,
            );
          }

          const channel = current.alpha === null ? "stable" : "alpha";
          const latestStable = tags.find((item) => item.parsed.alpha === null) ?? null;
          const previousNotesTag =
            channel === "stable" ? (latestStable?.tag ?? "") : (latest?.tag ?? "");
          const output = {
            latestTag: previousNotesTag,
            nextVersion: fileVersion,
            nextTag: `v${fileVersion}`,
            channel,
            isPrerelease: channel === "alpha",
          };
          process.stdout.write(JSON.stringify(output));
          NODE
          )"

          latest_tag="$(node -e 'process.stdout.write(JSON.parse(process.argv[1]).latestTag)' "${version_payload}")"
          next_version="$(node -e 'process.stdout.write(JSON.parse(process.argv[1]).nextVersion)' "${version_payload}")"
          next_tag="$(node -e 'process.stdout.write(JSON.parse(process.argv[1]).nextTag)' "${version_payload}")"
          channel="$(node -e 'process.stdout.write(JSON.parse(process.argv[1]).channel)' "${version_payload}")"
          is_prerelease="$(node -e 'process.stdout.write(String(JSON.parse(process.argv[1]).isPrerelease))' "${version_payload}")"

          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "next_version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub release notes
        id: release_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_TAG: ${{ steps.version.outputs.latest_tag }}
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
          TARGET_COMMITISH: ${{ github.sha }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("fs");

          async function main() {
            const repository = process.env.GITHUB_REPOSITORY;
            const token = process.env.GITHUB_TOKEN;
            const latestTag = process.env.LATEST_TAG;
            const nextTag = process.env.NEXT_TAG;
            const targetCommitish = process.env.TARGET_COMMITISH;

            const payload = {
              tag_name: nextTag,
              target_commitish: targetCommitish,
            };

            if (latestTag) {
              payload.previous_tag_name = latestTag;
            }

            const response = await fetch(
              `https://api.github.com/repos/${repository}/releases/generate-notes`,
              {
                method: "POST",
                headers: {
                  Accept: "application/vnd.github+json",
                  Authorization: `Bearer ${token}`,
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
                },
                body: JSON.stringify(payload),
              },
            );

            if (!response.ok) {
              throw new Error(
                `Failed to generate release notes: ${response.status} ${await response.text()}`,
              );
            }

            const notes = await response.json();
            const body = String(notes.body ?? "").trim();
            const delimiter = `RELEASE_NOTES_${Date.now()}_${Math.random().toString(36).slice(2)}`;

            fs.appendFileSync(
              process.env.GITHUB_OUTPUT,
              `body<<${delimiter}\n${body || `Glyph ${nextTag}`}\n${delimiter}\n`,
            );
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

  build-macos:
    needs: prepare
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Sync version files
        env:
          NEXT_VERSION: ${{ needs.prepare.outputs.next_version }}
        run: |
          set -euo pipefail

          node -e '
            const fs = require("fs");
            const next = process.env.NEXT_VERSION;

            const pkgPath = "package.json";
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            pkg.version = next;
            fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, "\t")}\n`);

            const tauriPath = "src-tauri/tauri.conf.json";
            const tauri = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
            tauri.version = next;
            fs.writeFileSync(tauriPath, `${JSON.stringify(tauri, null, "\t")}\n`);

            const cargoPath = "src-tauri/Cargo.toml";
            const cargo = fs.readFileSync(cargoPath, "utf8");
            fs.writeFileSync(
              cargoPath,
              cargo.replace(/^version = "[^"]+"/m, `version = "${next}"`),
            );
          '

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format updated version files
        run: pnpm exec biome format --write package.json src-tauri/tauri.conf.json

      - name: Check formatting and lint
        run: pnpm check

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLYPH_SUPPORT_URL: "https://github.com/Sharathchenna/Glyph/issues"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        with:
          tagName: ${{ needs.prepare.outputs.next_tag }}
          releaseName: "Glyph ${{ needs.prepare.outputs.next_tag }}"
          releaseBody: ${{ needs.prepare.outputs.release_body }}
          releaseDraft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          includeUpdaterJson: true

  build-windows:
    needs: [prepare, build-macos]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Sync version files
        shell: bash
        env:
          NEXT_VERSION: ${{ needs.prepare.outputs.next_version }}
        run: |
          set -euo pipefail

          node -e '
            const fs = require("fs");
            const next = process.env.NEXT_VERSION;

            const pkgPath = "package.json";
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            pkg.version = next;
            fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, "\t")}\n`);

            const tauriPath = "src-tauri/tauri.conf.json";
            const tauri = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
            tauri.version = next;
            fs.writeFileSync(tauriPath, `${JSON.stringify(tauri, null, "\t")}\n`);

            const cargoPath = "src-tauri/Cargo.toml";
            const cargo = fs.readFileSync(cargoPath, "utf8");
            fs.writeFileSync(
              cargoPath,
              cargo.replace(/^version = "[^"]+"/m, `version = "${next}"`),
            );
          '

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLYPH_SUPPORT_URL: "https://github.com/Sharathchenna/Glyph/issues"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare.outputs.next_tag }}
          releaseName: "Glyph ${{ needs.prepare.outputs.next_tag }}"
          releaseBody: ${{ needs.prepare.outputs.release_body }}
          releaseDraft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          includeUpdaterJson: true

  publish-updater-manifest:
    needs: [prepare, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
          NEXT_TAG: ${{ needs.prepare.outputs.next_tag }}
        run: |
          set -euo pipefail

          manifest_source="$(mktemp -d)"
          manifest_worktree="$(mktemp -d)"
          rm -rf "${manifest_worktree}"
          trap 'git worktree remove --force "${manifest_worktree}" >/dev/null 2>&1 || rm -rf "${manifest_worktree}"' EXIT

          node - "${manifest_source}/latest.json" <<'NODE'
          const fs = require("node:fs");

          async function main() {
            const [outputPath] = process.argv.slice(2);
            const repository = process.env.GITHUB_REPOSITORY;
            const token = process.env.GITHUB_TOKEN;
            const tag = process.env.NEXT_TAG;
            const headers = {
              Accept: "application/vnd.github+json",
              Authorization: `Bearer ${token}`,
              "X-GitHub-Api-Version": "2022-11-28",
            };

            const releaseResponse = await fetch(
              `https://api.github.com/repos/${repository}/releases/tags/${encodeURIComponent(tag)}`,
              { headers },
            );
            if (!releaseResponse.ok) {
              throw new Error(
                `Failed to load release ${tag}: ${releaseResponse.status} ${await releaseResponse.text()}`,
              );
            }

            const release = await releaseResponse.json();
            const asset = release.assets?.find((item) => item.name === "latest.json");
            if (!asset) {
              throw new Error(`Release ${tag} does not have a latest.json asset.`);
            }

            const assetResponse = await fetch(asset.url, {
              headers: { ...headers, Accept: "application/octet-stream" },
            });
            if (!assetResponse.ok) {
              throw new Error(
                `Failed to download latest.json: ${assetResponse.status} ${await assetResponse.text()}`,
              );
            }

            fs.writeFileSync(outputPath, Buffer.from(await assetResponse.arrayBuffer()));
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

          if git ls-remote --exit-code --heads origin update-manifests >/dev/null 2>&1; then
            git fetch origin update-manifests:update-manifests
            git worktree add "${manifest_worktree}" update-manifests
          else
            git worktree add --detach "${manifest_worktree}" HEAD
            git -C "${manifest_worktree}" checkout --orphan update-manifests
            git -C "${manifest_worktree}" rm -rf . >/dev/null 2>&1 || true
          fi

          channels="${CHANNEL}"
          if [ "${CHANNEL}" = "stable" ]; then
            channels="stable alpha"
          fi

          for channel in ${channels}; do
            mkdir -p "${manifest_worktree}/${channel}"
            cp "${manifest_source}/latest.json" "${manifest_worktree}/${channel}/latest.json"
            git -C "${manifest_worktree}" add "${channel}/latest.json"
          done

          git -C "${manifest_worktree}" config user.name "github-actions[bot]"
          git -C "${manifest_worktree}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git -C "${manifest_worktree}" diff --cached --quiet; then
            echo "Updater manifest is already current."
            exit 0
          fi

          git -C "${manifest_worktree}" commit -m "Update ${CHANNEL} updater manifests for ${NEXT_TAG}"
          git -C "${manifest_worktree}" push origin HEAD:update-manifests
