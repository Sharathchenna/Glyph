name: Tauri Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tauri-release-main
  cancel-in-progress: false

jobs:
  release-gate:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
    steps:
      - name: Evaluate release marker
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s' "${COMMIT_MESSAGE}" | grep -qi '\[release\]'; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    needs: release-gate
    if: needs.release-gate.outputs.should_release == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail

          latest_tag="$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)"
          file_version="$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json','utf8')).version")"
          tag_version="${latest_tag#v}"
          if [ -z "${latest_tag}" ]; then
            tag_version="0.0.0"
          fi

          version_order="$(node -e '
            const [fileVersion, tagVersion] = process.argv.slice(1);
            const valid = (v) => /^\d+\.\d+\.\d+$/.test(v);
            if (!valid(fileVersion)) {
              throw new Error(`Invalid app version: ${fileVersion}`);
            }
            if (!valid(tagVersion)) {
              throw new Error(`Invalid tag version: ${tagVersion}`);
            }
            const parse = (v) => v.split(".").map((x) => Number.parseInt(x, 10));
            const av = parse(fileVersion);
            const bv = parse(tagVersion);
            const cmp =
              av[0] - bv[0] ||
              av[1] - bv[1] ||
              av[2] - bv[2];
            process.stdout.write(String(Math.sign(cmp)));
          ' "${file_version}" "${tag_version}")"

          if ! [[ "${version_order}" =~ ^(-1|0|1)$ ]]; then
            echo "Invalid version ordering result: ${version_order}"
            exit 1
          fi

          if [ "${version_order}" != "1" ]; then
            echo "src-tauri/tauri.conf.json version (${file_version}) must be greater than latest tag (${latest_tag:-none})."
            exit 1
          fi

          next_version="${file_version}"
          next_tag="v${next_version}"

          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "next_version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"

      - name: Sync version files
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          set -euo pipefail

          node -e '
            const fs = require("fs");
            const next = process.env.NEXT_VERSION;

            const pkgPath = "package.json";
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            pkg.version = next;
            fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, "\t")}\n`);

            const tauriPath = "src-tauri/tauri.conf.json";
            const tauri = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
            tauri.version = next;
            fs.writeFileSync(tauriPath, `${JSON.stringify(tauri, null, "\t")}\n`);
          '

          sed -i.bak -E "0,/^version = \"[^\"]+\"/s//version = \"${NEXT_VERSION}\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format updated version files
        run: pnpm exec biome format --write package.json src-tauri/tauri.conf.json

      - name: Validate
        run: |
          pnpm check
          pnpm build
          cd src-tauri && cargo check

      - name: Generate GitHub release notes
        id: release_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_TAG: ${{ steps.version.outputs.latest_tag }}
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
          TARGET_COMMITISH: ${{ github.sha }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("fs");

          async function main() {
            const repository = process.env.GITHUB_REPOSITORY;
            const token = process.env.GITHUB_TOKEN;
            const latestTag = process.env.LATEST_TAG;
            const nextTag = process.env.NEXT_TAG;
            const targetCommitish = process.env.TARGET_COMMITISH;

            const payload = {
              tag_name: nextTag,
              target_commitish: targetCommitish,
            };

            if (latestTag) {
              payload.previous_tag_name = latestTag;
            }

            const response = await fetch(
              `https://api.github.com/repos/${repository}/releases/generate-notes`,
              {
                method: "POST",
                headers: {
                  Accept: "application/vnd.github+json",
                  Authorization: `Bearer ${token}`,
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
                },
                body: JSON.stringify(payload),
              },
            );

            if (!response.ok) {
              throw new Error(
                `Failed to generate release notes: ${response.status} ${await response.text()}`,
              );
            }

            const notes = await response.json();
            const body = String(notes.body ?? "").trim();
            const delimiter = `RELEASE_NOTES_${Date.now()}_${Math.random().toString(36).slice(2)}`;

            fs.appendFileSync(
              process.env.GITHUB_OUTPUT,
              `body<<${delimiter}\n${body || `Glyph ${nextTag}`}\n${delimiter}\n`,
            );
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLYPH_OFFICIAL_BUILD: "1"
          GLYPH_GUMROAD_PRODUCT_ID: "jfc0rwnuPw7VuqCyw5ctTw=="
          GLYPH_GUMROAD_PRODUCT_URL: "https://karatsidhu.gumroad.com/l/sqxfay"
          GLYPH_SUPPORT_URL: "https://github.com/SidhuK/Glyph/issues"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        with:
          tagName: ${{ steps.version.outputs.next_tag }}
          releaseName: "Glyph ${{ steps.version.outputs.next_tag }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Notify Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "HOMEBREW_TAP_DISPATCH_TOKEN is not configured."
            exit 1
          fi

          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/SidhuK/homebrew-glyph/dispatches \
            -d '{"event_type":"glyph_release_published"}'
